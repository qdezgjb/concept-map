<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>概念图自动生成系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 头部标题 -->
        <header class="header">
            <h1>概念图自动生成系统</h1>
            <p>基于AI的智能概念图生成与编辑平台</p>
        </header>

        <!-- 主要内容区域 -->
        <main class="main-content">
            <!-- 左侧功能选择区域 -->
            <aside class="sidebar">
                <div class="function-section">
                    <h2>功能选择</h2>
                    
                    <!-- 功能1：关键词生成 -->
                    <div class="function-card">
                        <div class="function-header">
                            <h3>🔍 关键词生成概念图</h3>
                            <span class="function-desc">输入一个关键词，AI自动生成相关概念图</span>
                        </div>
                        <div class="function-content">
                            <div class="input-group">
                                <label for="keyword">关键词：</label>
                                <input type="text" id="keyword" placeholder="请输入中心概念关键词" class="input-field">
                            </div>
                            <button class="btn btn-primary">生成概念图</button>
                        </div>
                    </div>

                    <!-- 功能2：文本分析生成 -->
                    <div class="function-card">
                        <div class="function-header">
                            <h3>📝 文本分析生成概念图</h3>
                            <span class="function-desc">输入一段描述文字，AI分析并生成概念图</span>
                        </div>
                        <div class="function-content">
                            <div class="input-group">
                                <label for="description">描述文字：</label>
                                <textarea id="description" placeholder="请输入要分析的文字内容" class="textarea-field" rows="4"></textarea>
                            </div>
                            <button class="btn btn-primary">分析生成</button>
                        </div>
                    </div>

                    <!-- 功能3：编辑功能说明 -->
                    <div class="function-card">
                        <div class="function-header">
                            <h3>✏️ 交互式编辑</h3>
                            <span class="function-desc">支持拖拽、编辑、下载等操作</span>
                        </div>
                        <div class="function-content">
                            <ul class="feature-list">
                                <li>拖拽移动节点位置</li>
                                <li>编辑节点和连线内容</li>
                                <li>添加/删除节点连线</li>
                                <li>下载概念图图片</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 右侧概念图展示区域 -->
            <section class="content-area">
                <div class="graph-container">
                    <div class="graph-header">
                        <h2>概念图展示区域</h2>
                        <div class="graph-controls">
                            <button class="btn btn-secondary">重置视图</button>
                            <button class="btn btn-secondary">导出图片</button>
                        </div>
                    </div>
                    
                    <!-- 编辑工具栏 -->
                    <div class="edit-toolbar" style="display: none;">
                        <div class="toolbar-section">
                            <h4>节点操作</h4>
                            <button class="btn btn-sm btn-outline" id="addNodeBtn">➕ 添加节点</button>
                            <button class="btn btn-sm btn-outline" id="deleteNodeBtn">➖ 删除节点</button>
                            <button class="btn btn-sm btn-outline" id="editNodeBtn">✏️ 编辑节点</button>
                        </div>
                        <div class="toolbar-section">
                            <h4>连线操作</h4>
                            <button class="btn btn-sm btn-outline" id="addLinkBtn">🔗 添加连线</button>
                            <button class="btn btn-sm btn-outline" id="deleteLinkBtn">❌ 删除连线</button>
                            <button class="btn btn-sm btn-outline" id="editLinkBtn">✏️ 编辑连线</button>
                        </div>
                        <div class="toolbar-section">
                            <h4>布局控制</h4>
                            <select id="layoutSelect" class="select-field">
                                <option value="force">力导向布局</option>
                                <option value="hierarchy">层次布局</option>
                                <option value="circular">圆形布局</option>
                            </select>
                            <button class="btn btn-sm btn-outline" id="autoLayoutBtn">🔄 自动布局</button>
                        </div>
                        <div class="toolbar-section">
                            <h4>样式设置</h4>
                            <input type="color" id="nodeColorPicker" class="color-picker" value="#667eea">
                            <input type="color" id="linkColorPicker" class="color-picker" value="#999">
                            <select id="nodeShapeSelect" class="select-field">
                                <option value="circle">圆形</option>
                                <option value="rect">矩形</option>
                                <option value="diamond">菱形</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- 概念图占位区域 -->
                    <div class="graph-placeholder">
                        <div class="placeholder-content">
                            <div class="placeholder-icon">📊</div>
                            <h3>等待生成概念图</h3>
                            <p>请选择左侧功能并输入内容，系统将自动生成概念图</p>
                        </div>
                    </div>

                    <!-- 示例概念图结构（隐藏状态） -->
                    <div class="sample-graph" style="display: none;">
                        <svg width="100%" height="600" class="concept-graph">
                            <!-- 这里将来会放置D3.js生成的概念图 -->
                        </svg>
                    </div>
                    
                    <!-- 状态栏 -->
                    <div class="status-bar">
                        <div class="status-info">
                            <span id="nodeCount">节点: 0</span>
                            <span id="linkCount">连线: 0</span>
                        </div>
                        <div class="status-actions">
                            <button class="btn btn-sm btn-outline" id="saveBtn">💾 保存</button>
                            <button class="btn btn-sm btn-outline" id="loadBtn">📂 加载</button>
                            <button class="btn btn-sm btn-outline" id="undoBtn" disabled>↶ 撤销</button>
                            <button class="btn btn-sm btn-outline" id="redoBtn" disabled>↷ 重做</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- 底部信息 -->
        <footer class="footer">
            <p>概念图自动生成系统 v1.0 | 基于D3.js + AI技术</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
